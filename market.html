<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olive DAO | Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .nav-right {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    /* Professional Modal Backdrop */
    #treeDetailsModal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.6); /* Dim background */
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(4px);
    }

    /* Modal Box */
    .modal-content {
        background: #ffffff;
        width: 450px;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        border: 1px solid #e0e0e0;
        position: relative;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Typography & Layout */
    .modal-content h2 { margin-top: 0; color: #1b4332; }
    .modal-content p { line-height: 1.6; color: #444; }
    .modal-stats { display: flex; justify-content: space-between; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; }
    .modal-btn {
        width: 100%; padding: 12px; border-radius: 8px; border: none;
        font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .stake-btn { background: #2d6a4f; color: white; margin-bottom: 10px; }
    .close-btn { background: #eee; color: #666; }
    .wallet-box {
        background: #2d6a4f;
        padding: 5px 12px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: background 0.2s;
        border: 1px solid #40916c;
    }

    .wallet-box:hover {
        background: #40916c;
    }

    .wallet-address {
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.85rem;
        color: #d8f3dc;
    }

    .copy-icon {
        width: 14px;
        height: 14px;
        fill: #95d5b2;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .modal-open {
        overflow: hidden !important;
    }
    #copy-toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1b4332;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        display: none;
        z-index: 2000;
        animation: fadeIn 0.3s;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Modern Header Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #1b4332;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.8; display: block; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #74c69d; }

        /* Modal improvements */
        #sellModal {
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            border: none;
            width: 300px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
  <nav>
    <div class="nav-left">
        <strong>🫒 OLIVE DAO</strong>
        <a href="ad2.html" style="margin-left: 20px;">Admin Dashboard</a>
    </div>
    <div class="nav-right">
        <div id="wallet-container" class="wallet-box" style="display: none;" onclick="copyAddress()">
            <span id="wallet-display" class="wallet-address">Address...</span>
            <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </div>
        <button id="connectBtn">Connect Wallet</button>
    </div>
</nav>

<div id="copy-toast">Address Copied!</div>

    <main>
        <section class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Wallet Balance</span>
                <span id="balance-sol" class="stat-value">0.00</span> <small>SOL</small>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Tree Shares </span>
                <span id="balance-liquid" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">My Total Staked Fractions</span>
                <span id="balance-staked" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Global DAO Weight</span>
                <span id="balance-weight" class="stat-value">0%</span>
            </div>
        </section>

        <h1>🌳 Tree Fractions Marketplace</h1>

        <section id="portfolio-section">
            <h2>Your Portfolio</h2>
            <div id="user-positions" class="grid-container">
                </div>
        </section>

        <hr>

        <section id="market-section">
            <h2>Available Listings</h2>
            <div id="active-listings" class="grid-container">
                </div>
        </section>
    </main>

    <div id="deepTreeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px);">

    <div id="modal-content-deep" class="modal-content">
        </div>
</div>
    <div id="sellModal" style="display:none; position:fixed; background:white; padding:25px; top:50%; left:50%; transform:translate(-50%, -50%); z-index: 1000; border-radius: 15px; width: 320px;">
        <h3 style="margin-top:0; color: #1b4332;">List Fractions</h3>
        <input type="hidden" id="modalTreePda">
        <label style="color: #666; font-size: 0.8rem;">Amount to Sell</label>
        <input type="number" id="sellSharesCount" class="modal-input" style="width:100%; padding:8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <label style="color: #666; font-size: 0.8rem;">Total Price (SOL)</label>
        <input type="number" step="0.01" id="sellPriceSol" style="width:100%; padding:8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <button onclick="executeListing()" class="stake-btn modal-btn">Confirm Listing</button>
        <button onclick="document.getElementById('sellModal').style.display='none'" class="close-btn modal-btn">Cancel</button>
    </div>

    <div id="StakeModal" style="display: none; position:fixed; background:white; padding:25px; top:50%; left:50%; transform:translate(-50%, -50%); z-index: 1000; border: 2px solid #3498db; border-radius: 15px; width: 320px;">
        <h3 style="margin-top:0; color: #2980b9;">Stake Shares</h3>
        <div id="stake-status-badge" style="margin: 10px 0; font-size: 0.8rem;">Checking status...</div>
        <input type="hidden" id="modalTreePdaStake">
        <label style="color: #666; font-size: 0.8rem;">Amount:</label>
        <input type="number" id="stakeAmountInput" style="width:100%; padding:8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <button onclick="confirmStake()" style="width:100%; background:#3498db; color:white; padding:12px; border:none; cursor:pointer; border-radius:8px; font-weight:bold;">Confirm Stake</button>
        <button onclick="closeStakeModal()" class="close-btn modal-btn" style="margin-top:10px;">Cancel</button>
    </div>
        <script type="module" src="/src/market.ts"></script>
</body>
</html>
